<html lang="zh-cn">
    <title>
        欢迎来到KaibaiToday
    </title>
    <head>
        <meta content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
        <style>
            *{
                margin:0;
                padding:0;
            }

            .img-cover{
                object-fit:cover;
                width:100%;
                height: 100%;
                left:0px;
                top:0px;
                padding-left: 0px; 
                padding-top:0px;
            }
            .img-contain{
                object-fit:contain;
                width:100%;
                height: 100%;
                left:0px;
                top:0px;
                padding-left: 0px; 
                padding-top:0px;
            }
                #sidebar{
                    display:flex;
                    flex-wrap:wrap;
                    align-content: flex-start;
                    flex-direction:row;
                    background-color: rgb(255, 255, 255);
                    width: 15vw;
                    left:0px;
                    height: 100%;
                    order:1;
                    box-shadow:
                    0px 10px 5px 5px rgb(206, 206, 206);
                    z-index:4;
                    top: 6vh;
                    position:fixed;
                }
                #mainpage{
                    top:6vh;
                    left:15vw;
                    bottom: 0px;
                    position: absolute; 
                    right: 0px;
                }
                #topbar{
                    display:flex;
                    flex-direction:row;
                    overflow: hidden;
                    order:0;
                    justify-content: space-between;
                    width:100%;
                    height: 6vh;
                    box-shadow: 0px 0px 5px 5px rgb(238,238,238);
                    z-index:5;
                    position: fixed;
                    background-color: white;
                }
                .sidebtn{
                text-transform: uppercase;
	            text-decoration: none;
                display: inline-block;
                border-radius: 5px;
                transition: all .2s;
                position: relative;
                animation: moveInBottom 1s 0.75s;
                animation-fill-mode: backwards; 
                border-color: transparent;
                text-align: center;
                background-color: transparent;
            }
            .sidebtn:hover{
                transform: translateY(-1px);
                background-color:rgb(226, 226, 226) ;
	            box-shadow: 0 10px 10px rgba(0,10,0,0.2);
            }
            .sidebtn:active{
                transform: translateY(3px);
	            box-shadow: 0 5px 10px rgba(0,0,0,0.2);
            }
            #touxiangkuang{
                order: 2;
                display: flex;
                justify-content: center;
                align-items: center;
                width:10%;
                height:6vh;
            }
        </style>
    </head>
    <body style="overflow:scroll">
        <div style="width:100%; height: 100%; position: absolute; right: 0px;margin: 0; padding: 0;left:0px;top: 0px;bottom: 0px;">
            <div id="topbar">
                <button class="sidebtn" style="width: 10%;order: 0;">尚未开发</button>
                <button class="sidebtn" style="width: 10%;order: 0;">尚未开发</button>
                <button class="sidebtn" style="width: 10%;order: 0;">尚未开发</button>
                <div style="width:40%;order: 1; box-shadow: 0px 0px 5px 5px rgb(238,238,238);">
                </div>
                <button class="sidebtn" style="width: 10%;order: 2;">尚未开发</button>
                <button class="sidebtn" style="width: 10%;order: 2;">尚未开发</button>
                <div id="touxiangkuang">
                    <a class="sidebtn" style="border-radius: 50%;">
                    <img src="Resources/1.png" alt="awww" class="img-cover" style="border-radius: 50%; width: 5.5vh;height: 5.5vh;box-shadow: 0px 10px 5px 5px rgb(239, 239, 239);">
                    </a>
                </div>
            </div>
            <iframe style="bottom:10% ;right:10%;z-index:5;visibility: hidden;" frameborder="no" border="5" marginwidth="0" marginheight="0" src="//music.163.com/outchain/player?type=2&id=1839140772&auto=1&height=66"></iframe>   
            <div id="sidebar">
                <button class="sidebtn" style="width: 100%;order: 2; height:50px;">[null]</button>   
                <button class="sidebtn" style="width: 100%;order: 2; height:50px;">[null]</button> 
            </div>
            <div id="mainpage">
                <div style="display:flex;flex-direction:column;background-color: white;order:1;width:100%;">
                        <img class="img-contain" src="Resources/index.png" alt="index";>
                        <button class="sidebtn" style="width: 100%;order: 2; height:50px;">[null]</button>
                        <button class="sidebtn" style="width: 100%;order: 2; height:50px;">[null]</button>
                        <button class="sidebtn" style="width: 100%;order: 2; height:50px;">[null]</button>
                        <button class="sidebtn" style="width: 100%;order: 2; height:50px;">[null]</button>   
                </div>
            </div>
        </div>
    </body>

    </script>
</html>
